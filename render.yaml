services:
  - type: web
    name: assetra-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run prisma:generate && npm run prisma:push
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: EVENT_BROKER_DRIVER
        value: rabbitmq
      - key: RABBITMQ_URL
        sync: false
      - key: INTEGRATION_API_KEY
        sync: false
  - type: worker
    name: assetra-events-worker
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run worker:events
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BROKER_DRIVER
        value: rabbitmq
      - key: RABBITMQ_URL
        sync: false
